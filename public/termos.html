<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8" />

  <meta
    http-equiv="Content-Type"
    content="text/html; charset=UTF-8"
  />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Termos
  </title>

  <style>

    *{
      box-sizing:border-box;
    }

    body{

      margin:0;

      font-family:Arial, sans-serif;

      background:#f8fafc;

      color:#0f172a;

      padding:40px;
    }

    .termo-page{

      display:flex;

      justify-content:center;
    }

    .termo-card{

      width:100%;

      max-width:1000px;

      background:white;

      padding:40px;

      border-radius:20px;

      box-shadow:
        0 10px 30px rgba(0,0,0,.08);
    }

    #titulo{

      margin-top:0;

      margin-bottom:10px;

      color:#0f172a;
    }

    .termo-versao{

      color:#64748b;

      margin-bottom:30px;

      font-size:14px;
    }

    .termo-conteudo{

      line-height:1.8;

      font-size:16px;
    }

    .termo-conteudo h2{

      margin-top:40px;

      color:#0f172a;
    }

    .termo-conteudo h3{

      margin-top:25px;

      color:#1e293b;
    }

    .termo-conteudo p{

      margin:16px 0;
    }

    .termo-conteudo ul{

      padding-left:22px;
    }

    .termo-conteudo li{

      margin-bottom:8px;
    }

    @media (max-width:768px){

      body{

        padding:20px;
      }

      .termo-card{

        padding:24px;
      }
    }

  </style>

</head>

<body>

  <div class="termo-page">

    <div class="termo-card">

      <h1 id="titulo">
        Carregando...
      </h1>

      <div
        id="versao"
        class="termo-versao"
      ></div>

      <div
        id="conteudo"
        class="termo-conteudo"
      ></div>

    </div>

  </div>

  <script src="js/termo.js"></script>

</body>
</html>
